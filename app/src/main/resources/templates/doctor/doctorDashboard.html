<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Dashboard</title>
    <link rel="icon" th:href="@{/assets/images/favicon.ico}" type="image/x-icon">
    
    <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">

    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/components/header.js}" defer></script>
    <script th:src="@{/js/components/footer.js}" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>
            
            <main class="main-content">
                <div class="filter-container">
                    <input type="text" id="searchBar" placeholder="Search patients..." />
                    <div class="date-filters">
                        <button id="todayButton" class="adminBtn">Today's Appointments</button>
                        <input type="date" id="datePicker" />
                    </div>
                </div>

                <table id="patientTable">
                    <thead>
                        <tr>
                            <th>Patient ID</th>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Prescription</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody">
                        </tbody>
                </table>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <script type="module" src="../js/services/patientServices.js" defer></script>
    <script type="module" src="../js/doctorDashboard.js" defer></script>
    <script type="module" src="../js/components/patientRows.js" defer></script>
</body>
</html>
